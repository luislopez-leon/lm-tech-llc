name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install linters
        run: npm install -g html-validate stylelint stylelint-config-standard

      - name: Lint HTML
        run: html-validate index.html

      - name: Lint CSS
        run: stylelint style.css
